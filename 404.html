<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 · Black Diamond Gym</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" id="site-favicon" href="/favicon.ico" type="image/x-icon">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --red: #e31c25;
            --dark: #0a0a0a;
            --font-h: 'Bebas Neue', sans-serif;
            --font-b: 'Montserrat', sans-serif;
        }
        body {
            background: var(--dark);
            color: #fff;
            font-family: var(--font-b);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            overflow: hidden;
        }

        /* Fondo animado */
        .bg-lines {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        .bg-lines::before, .bg-lines::after {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            border: 1px solid rgba(227,28,37,.06);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: expandRing 4s ease-out infinite;
        }
        .bg-lines::after { animation-delay: 2s; }
        @keyframes expandRing {
            0%   { width: 200px; height: 200px; opacity: .5; }
            100% { width: 900px; height: 900px; opacity: 0; }
        }

        .wrap {
            position: relative;
            z-index: 1;
            max-width: 600px;
        }

        /* Número 404 con glitch */
        .num-404 {
            font-family: var(--font-h);
            font-size: clamp(7rem, 22vw, 14rem);
            color: var(--red);
            line-height: 1;
            letter-spacing: 10px;
            animation: glitch 4s infinite;
            position: relative;
        }
        .num-404::before, .num-404::after {
            content: '404';
            position: absolute;
            inset: 0;
            opacity: .7;
        }
        .num-404::before { animation: glitch-before 4s infinite; color: #fff; }
        .num-404::after  { animation: glitch-after 4s infinite;  color: var(--red); }

        @keyframes glitch {
            0%, 85%, 100% { transform: none; }
            87% { transform: skewX(-3deg); }
            89% { transform: skewX(3deg); }
            91% { transform: none; }
        }
        @keyframes glitch-before {
            0%, 85%, 100% { clip-path: none; transform: none; }
            87% { clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%); transform: translate(-3px, 0); }
            89% { clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%); transform: translate(3px, 0); }
            91% { clip-path: none; transform: none; }
        }
        @keyframes glitch-after {
            0%, 85%, 100% { clip-path: none; transform: none; }
            87% { clip-path: polygon(0 40%, 100% 40%, 100% 60%, 0 60%); transform: translate(3px, 0); }
            89% { clip-path: polygon(0 0%, 100% 0%, 100% 20%, 0 20%); transform: translate(-3px, 0); }
            91% { clip-path: none; transform: none; }
        }

        .emoji-box { font-size: 3rem; margin: 8px 0 16px; animation: bounce 2s ease-in-out infinite; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-12px); }
        }

        .title {
            font-family: var(--font-h);
            font-size: clamp(1.4rem, 4vw, 2.2rem);
            letter-spacing: 3px;
            margin-bottom: 12px;
        }

        .sub {
            font-size: .9rem;
            color: #555;
            line-height: 1.7;
            margin-bottom: 36px;
            text-transform: none;
        }

        .btn-home {
            display: inline-block;
            background: var(--red);
            color: #fff;
            font-family: var(--font-h);
            font-size: 1.1rem;
            letter-spacing: 3px;
            padding: 14px 36px;
            border-radius: 50px;
            text-decoration: none;
            transition: transform .2s, box-shadow .2s;
            box-shadow: 0 6px 24px rgba(227,28,37,.35);
        }
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 32px rgba(227,28,37,.55);
        }

        .footer-404 {
            margin-top: 48px;
            font-size: .7rem;
            letter-spacing: 2px;
            color: #222;
            text-transform: uppercase;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: var(--red); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="bg-lines"></div>
    <div class="wrap">
        <div class="num-404">404</div>
        <div class="emoji-box">🥊</div>
        <h1 class="title">ROUND PERDIDO</h1>
        <p class="sub">
            La página que buscas no existe o fue eliminada.<br>
            Pero el gym sigue en pie — regresa al inicio.
        </p>
        <a href="/" class="btn-home">VOLVER AL INICIO</a>
        <p class="footer-404">Black Diamond Gym · Boxing Center · Bosa, Bogotá</p>
    </div>

    <script>
        // Cargar favicon dinámico
        fetch('/api/imagenes')
            .then(r => r.json())
            .then(imgs => {
                const fav = imgs.find(i => i.clave === 'favicon');
                if (fav && fav.url) document.getElementById('site-favicon').href = fav.url;
            }).catch(() => {});
    </script>
</body>
</html>
